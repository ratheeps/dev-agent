skills:
  react:
    tech_stack: react
    description: "React functional components, hooks, state management, and testing"
    prompt_file: "skills/react.md"
    file_patterns:
      - "*.jsx"
      - "*.tsx"
      - "src/components/**"
    keywords:
      - react
      - reactjs
      - react.js
      - jsx
      - react component
      - react hook
      - useState
      - useEffect
      - redux
      - zustand

  nextjs:
    tech_stack: nextjs
    description: "Next.js App Router, SSR/SSG/ISR, API routes, and middleware"
    prompt_file: "skills/nextjs.md"
    file_patterns:
      - "next.config.*"
      - "app/layout.*"
      - "app/page.*"
      - "pages/**"
    keywords:
      - nextjs
      - next.js
      - app router
      - pages router
      - vercel
      - server component

  typescript:
    tech_stack: typescript
    description: "TypeScript strict typing, generics, utility types, and patterns"
    prompt_file: "skills/typescript.md"
    file_patterns:
      - "*.ts"
      - "*.tsx"
      - "tsconfig.json"
      - "*.d.ts"
    keywords:
      - typescript
      - tsx
      - type safety
      - tsconfig
      - interface
      - generic type

  php:
    tech_stack: php
    description: "Modern PHP 8.x, PSR standards, Composer, and PHPUnit testing"
    prompt_file: "skills/php.md"
    file_patterns:
      - "*.php"
      - "composer.json"
      - "composer.lock"
    keywords:
      - php
      - composer
      - psr
      - phpunit
      - phpstan
      - symfony

  laravel:
    tech_stack: laravel
    description: "Laravel Eloquent ORM, controllers, migrations, jobs, and testing"
    prompt_file: "skills/laravel.md"
    file_patterns:
      - "artisan"
      - "app/Http/Controllers/**"
      - "app/Models/**"
      - "database/migrations/**"
      - "resources/views/**"
      - "routes/web.php"
      - "routes/api.php"
    keywords:
      - laravel
      - eloquent
      - artisan
      - blade
      - sanctum
      - livewire
      - inertia

  playwright:
    tech_stack: playwright
    description: "Playwright E2E testing, browser automation, UI verification and debugging"
    prompt_file: "skills/playwright.md"
    file_patterns:
      - "playwright.config.*"
      - "*.spec.ts"
      - "*.spec.js"
      - "e2e/**"
      - "tests/**/*.spec.*"
      - "test/**/*.spec.*"
    keywords:
      - playwright
      - e2e
      - end-to-end
      - browser test
      - ui test
      - page object
      - locator
      - test automation

  python:
    tech_stack: python
    description: "Python 3.12+, asyncio, Pydantic v2, FastAPI, httpx, pytest, mypy strict mode"
    prompt_file: "skills/python.md"
    file_patterns:
      - "*.py"
      - "pyproject.toml"
      - "requirements*.txt"
      - "setup.py"
    keywords:
      - python
      - fastapi
      - django
      - flask
      - pydantic
      - pytest
      - asyncio
      - httpx
      - uvicorn

  design_patterns:
    tech_stack: design_patterns
    description: "GiftBee software design patterns: Action/Command, Repository, Adapter, State Machine, Observer, Message Bus, Circuit Breaker, Strategy, POM, Factory, DI"
    prompt_file: "skills/design-patterns.md"
    file_patterns:
      - "app/Actions/**"
      - "app/Repositories/**"
      - "app/Observers/**"
      - "src/workflows/**"
      - "src/agents/**"
      - "src/resilience/**"
    keywords:
      - design pattern
      - architecture
      - repository pattern
      - action pattern
      - state machine
      - circuit breaker
      - message bus
      - adapter pattern
      - dependency injection
      - factory
      - observer
      - strategy pattern

  app_architecture:
    tech_stack: app_architecture
    description: "GiftBee 5-repo multi-service architecture: store-front, admin-portal, wallet-service, pim, local-infra. Auth flows, API contracts, feature-slice structure."
    prompt_file: "skills/app-architecture.md"
    file_patterns:
      - "src/app/**"
      - "src/features/**"
      - "routes/api.php"
      - "app/Http/Controllers/**"
    keywords:
      - multi-repo
      - microservice
      - api contract
      - feature slice
      - oauth2
      - passport
      - client credentials
      - password grant
      - api versioning
      - cross-service
      - storefront
      - admin portal
      - wallet service

  infra_architecture:
    tech_stack: infra_architecture
    description: "GiftBee infrastructure: local Docker Compose, AWS Lambda/Bref, Bedrock AgentCore, DynamoDB, API Gateway, OpenTofu, Bitbucket Pipelines, Secrets Manager"
    prompt_file: "skills/infra-architecture.md"
    file_patterns:
      - "docker-compose.yml"
      - "Dockerfile"
      - "serverless.yml"
      - "bitbucket-pipelines.yml"
      - "infra/**"
      - "*.tofu"
      - "*.tf"
    keywords:
      - docker
      - docker compose
      - dockerfile
      - nginx
      - aws
      - lambda
      - bref
      - sqs
      - s3
      - opentofu
      - terraform
      - deploy
      - deployment
      - ci/cd
      - pipeline
      - infrastructure
      - devops
      - cloudwatch
      - secrets manager
      - bedrock
      - agentcore
