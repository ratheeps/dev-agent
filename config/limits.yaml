cost:
  daily_ceiling_usd: 50.0
  alert_threshold_pct: 80

timeouts:
  orchestrator_minutes: 480
  worker_minutes: 30
  mcp_call_seconds: 30

rate_limits:
  jira_rpm: 60
  github_rpm: 60
  figma_rpm: 30
  teams_rpm: 30

workers:
  max_concurrent: 5
  max_per_ticket: 3

approval_gates:
  # Triggers that ALWAYS require human approval before proceeding
  always_require:
    - pre_merge        # merging PR to main/dev
    - destructive_migration  # irreversible DB migration
  # Triggers that ask when the agent is uncertain
  ask_when_uncertain:
    - architecture_decision
    - cost_threshold
  # Cost (USD) above which to pause and ask
  cost_threshold_usd: 5.0
  # How long to wait for human response before timing out
  timeout_minutes: 60
